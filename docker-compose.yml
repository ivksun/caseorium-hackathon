services:
  caseorium:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WP_URL=${WP_URL}
      - WP_USER=${WP_USER}
      - WP_APP_PASSWORD=${WP_APP_PASSWORD}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
    volumes:
      - ./cases:/app/cases
      - ./uploads:/app/uploads
    restart: unless-stopped
